name: CI

on:
  push:
    branches:
      - main
      - "dev/**"
      - "test/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  build:
    # 1. DEFINE THE MATRIX
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      # Fail-fast: false ensures that if Windows fails, Mac keeps running so you see results
      fail-fast: false

    # 2. USE THE MATRIX VARIABLE
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      # 3. LINUX SPECIFIC SETUP (XVFB)
      # Only runs on Linux because Mac/Windows handles headers differently
      - name: Install Xvfb (Linux Only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # 4. RUN TESTS
      # On Linux, we use xvfb-run. On Mac/Windows, we just run npm test.
      - name: Run Tests
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run -a npm test
          else
            npm test
          fi
        shell: bash

      # 5. COMPILE
      - name: Build
        run: npm run build

