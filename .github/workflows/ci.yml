name: CI

on:
  push:
    branches: [main, "dev/**", "test/**", "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # Move database variables here so they are available to ALL steps and processes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AZURE_SQL_SERVER: "localhost"
      AZURE_SQL_DATABASE: "test_db"
      AZURE_SQL_USER: "sa"
      AZURE_SQL_PASSWORD: "DummyPassword123"
      AZURE_SQL_ENCRYPT: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Xvfb (Linux Only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Tests
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run -a npm test
          else
            npm test
          fi
        shell: bash

      - name: Build
        run: npm run build
