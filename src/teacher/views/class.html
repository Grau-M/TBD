<div id="class-tab" class="tab-pane">
  <div class="header-row">
    <h1>🏫 My Classes</h1>
    <button id="btn-new-class" class="btn btn-primary">+ New Class</button>
  </div>

  <div id="class-form-card" class="card" style="display:none; max-width:600px;">
    <h2>Create New Class</h2>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label for="class-course-name">Course Name</label>
        <input type="text" id="class-course-name" placeholder="e.g. Intro to Computer Science" />
      </div>
      <div class="form-group">
        <label for="class-course-code">Course Code</label>
        <input type="text" id="class-course-code" placeholder="e.g. CS101" />
      </div>
      <div class="form-group">
        <label for="class-teacher-name">Teacher Name</label>
        <input type="text" id="class-teacher-name" placeholder="e.g. Dr. Smith" />
      </div>
      <div class="form-group">
        <label for="class-meeting-time">Meeting Time</label>
        <input type="text" id="class-meeting-time" placeholder="e.g. MWF 10:00–11:00 AM" />
      </div>
      <div class="form-group">
        <label for="class-start-date">Start Date</label>
        <input type="date" id="class-start-date" 
               style="cursor: pointer; width: 100%;" 
               onclick="this.showPicker()" 
               onfocus="this.showPicker()" />
      </div>
      <div class="form-group">
        <label for="class-end-date">End Date</label>
        <input type="date" id="class-end-date" 
               style="cursor: pointer; width: 100%;" 
               onclick="this.showPicker()" 
               onfocus="this.showPicker()" />
      </div>
    </div>
    <p id="class-form-error" style="color:#ef4444; font-size:0.9rem; margin:4px 0 12px; display:none;"></p>
    <div style="display:flex; gap:10px;">
      <button id="btn-submit-class" class="btn btn-primary">Create Class</button>
      <button id="btn-cancel-class" class="btn btn-secondary">Cancel</button>
    </div>
  </div>

  <div id="class-list-loading" style="display:none; text-align:center; padding:40px;">
    <div class="spinner"></div>
    <p class="meta" style="margin-top:12px;">Loading classes...</p>
  </div>

  <div id="class-list-empty" style="display:none; text-align:center; padding:60px; color:var(--muted);">
    <div style="font-size:3rem; margin-bottom:16px;">🏫</div>
    <p style="font-size:1.1rem; font-weight:600; margin-bottom:8px;">No classes yet</p>
    <p class="meta">Click <strong>+ New Class</strong> above to create your first class.</p>
  </div>

  <div id="class-list-view" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-top:4px;"></div>

  <div id="class-detail-view" class="card" style="display:none; margin-top:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
      <div>
        <h2 id="class-detail-title" style="margin:0;">Class Detail</h2>
        <div id="class-detail-meta" class="meta" style="margin-top:4px;"></div>
      </div>
      <button id="btn-back-to-classes" class="btn btn-secondary">Back to Classes</button>
    </div>

    <div style="display:flex; gap:8px; margin:14px 0 12px; flex-wrap:wrap;">
      <button id="class-detail-tab-students" class="btn btn-secondary" style="background:var(--accent); color:white;">Students</button>
      <button id="class-detail-tab-assignments" class="btn btn-secondary">Assignments</button>
    </div>

    <div id="class-detail-students" style="display:block;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <span></span>
        <button id="btn-refresh-students" class="btn btn-secondary" style="font-size:12px; padding:4px 10px;">&#8635; Refresh</button>
      </div>
      <div id="class-students-empty" class="meta" style="display:none; padding:10px 0;">No students linked to this class yet.</div>
      <div style="overflow-x:auto;">
        <table id="class-students-table" style="width:100%; border-collapse:collapse; display:none;">
          <thead>
            <tr style="text-align:left; border-bottom:1px solid var(--border);">
              <th style="padding:8px;">Student</th>
              <th style="padding:8px;">Role</th>
            </tr>
          </thead>
          <tbody id="class-students-body"></tbody>
        </table>
      </div>
    </div>

    <div id="class-detail-assignments" style="display:none;">
      <div id="assignment-form-card" class="card" style="display:none; padding:14px; margin-bottom:12px;">
        <h3 style="margin-top:0; margin-bottom:10px;">Create Assignment</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-group" style="margin-bottom:0;">
            <label for="assignment-name">Assignment Name</label>
            <input type="text" id="assignment-name" placeholder="Project 1 - Sorting Visualizer" />
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label for="assignment-due-date">Due Date</label>
            <input type="date" id="assignment-due-date" 
                   style="cursor: pointer; width: 100%;" 
                   onclick="this.showPicker()" 
                   onfocus="this.showPicker()" />
          </div>
          <div class="form-group" style="grid-column:1/-1; margin-bottom:0;">
            <label for="assignment-description">Description</label>
            <input type="text" id="assignment-description" placeholder="Optional assignment details" />
          </div>
        </div>
        <p id="assignment-form-error" style="color:#ef4444; font-size:0.9rem; margin:8px 0 10px; display:none;"></p>
        <button id="btn-create-assignment" class="btn btn-primary">Create Assignment</button>
      </div>

      <div id="class-assignments-empty" class="meta" style="display:none; padding:20px 0; text-align:center;">No assignments yet for this class.</div>
      <div id="class-assignments-list" style="margin-bottom:20px;"></div>
      </div>
  </div>
</div>
