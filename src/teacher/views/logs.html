<div id="logs-tab" class="tab-pane">
  <div class="header-row">
    <h1>Session Logs</h1>
  </div>

  <div class="card">
    <div class="form-group search-container">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <label style="margin:0;">Search Student Logs</label>
        <div class="search-meta">
          <span id="log-count">Loading logs...</span>
          <button id="refresh-logs" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.9rem;">Refresh List</button>
        </div>
      </div>
      <div class="input-wrap" style="position:relative;">
        <input id="log-search-input" class="mt-2" type="text" placeholder="Start typing a name (e.g. 'John')..." autocomplete="off" />
        <button id="clear-search" class="btn clear-btn" type="button" title="Clear search">✖</button>
        <div id="log-dropdown" class="dropdown-list"></div>
      </div>
    </div>
  </div>

  <div id="logs-viewer-container" style="display:none;">
      <div class="header-row" style="margin-bottom:10px;">
          <h2 id="logs-log-name" style="margin:0;">Event Log</h2>
          <button id="close-log" class="btn btn-secondary" style="font-size:0.8rem; padding:4px 10px;">Close</button>
      </div>
      <div id="logs-view"></div>
  </div>
</div>
